set name = macaroons
set port = 15043

set pwd = $PWD
set src = $SOURCE_DIR

xrd.protocol https:15043 libXrdHttp.so

xrd.tlsca certfile $pwd/../tls/ca.pem
xrd.tls $pwd/../tls/host.pem $pwd/../tls/host.key

xrootd.seclib libXrdSec.so

sec.protparm gsi -ca:verify -certdir:$pwd/../tls
sec.protparm gsi -key:$pwd/../tls/host.key
sec.protparm gsi -cert:$pwd/../tls/host.pem
sec.protparm gsi -gridmap:$pwd/macaroons.gridmap
sec.protparm gsi -gmapopt:trymap,usedn
sec.protparm gsi -dlgpxy:request -exppxy:=creds
sec.protparm gsi -md:sha512:sha256:md5
sec.protparm gsi -d:1 -trustdns:false

sec.protocol gsi
sec.protocol ztn
sec.protbind * only gsi ztn

http.gridmap $pwd/macaroons.gridmap
http.header2cgi Authorization authz strip-on-redirect

ofs.authorize
ofs.authlib libXrdMacaroons.so
http.exthandler xrdmacaroons libXrdMacaroons.so

macaroons.secretkey $pwd/macaroons.secret
macaroons.onmissing passthrough

acc.authdb $pwd/macaroons.authdb

continue $src/common.cfg
