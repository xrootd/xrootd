set name = tpcredir
set port = 9094

set src = $SOURCE_DIR
set bin = $BINARY_DIR

xrootd.seclib libXrdSec.so
xrd.protocol XrdHttp:$port libXrdHttp.so
http.desthttps false

http.exthandler xrdtpc +notls libXrdHttpTPC.so

# Allow source/destination URLs that resolve to localhost.  The test reuses
# this same xrootd as the COPY source so we don't need an external origin.
tpc.allow local

# How the COPY redirect path gets exercised on a single xrootd:
#   * The test client COPYs to '/destfile?tpc.key=test'.  XrdHttp parses
#     the opaque off the URL and hands it to the HTTP TPC ext handler,
#     which then folds 'tpc.key=test' into the local destination open's
#     opaque.  (Sending xrd-http-query as an HTTP header would not work:
#     XrdHttp overwrites that header with the URL opaque on entry.)
#   * Still inside the same xrootd process, XrdOfs::open sees tpc.key +
#     write mode + RdrTPC and returns SFS_REDIRECT with the host:port
#     below as the target.
#   * RedirectTransfer routes that through XrdXrootdRedirHelper::Redirect,
#     which calls the test redirect plugin loaded via xrd.redirlib (see
#     below); the plugin overwrites both host and port so the Location
#     header carries the sentinel the test asserts on.
#   * The client just inspects the 307 Location header, so nothing has
#     to be listening on either localhost:9998 or the plugin-rewritten
#     host:port.
#
# Hack alert: HTTP TPC never naturally carries tpc.key (that field is an
# XRootD-protocol TPC handshake artifact).  In a real deployment this
# directive would only fire in a multi-server cluster where a TPC
# redirector xrootd bounces COPYs to a separate data server.  Synthesising
# tpc.key here lets the test trigger the same SFS_REDIRECT path on a
# single xrootd, so it does not need cmsd plus a second data server.
#
# The "?sfsopq=sfsval" suffix asks the OFS layer to attach that opaque to
# the redirect target.  Combined with the client's own "tpc.key=test", it
# exercises the '?' / '&' separator selection in RedirectTransfer's
# Location-header build (see XrdHttpTpcTPC.cc): the redirect URL must
# carry both pieces joined with '&', not '?'.
ofs.tpc redirect localhost:9998 sfsopq=sfsval

# Test-only redirect plugin built by tests/XRootD/redir_test/CMakeLists.txt.
# Always rewrites the redirect target to "rdlplugin-rewritten:9999" so the
# test can grep for that sentinel in either the HTTP Location header (TPC
# path) or the xrdcl client log (XRootD-protocol path).  The same
# "ofs.tpc redirect" directive above triggers SFS_REDIRECT for either an
# HTTP TPC open or a plain XRootD-protocol open, as long as the open
# carries tpc.key in its opaque; that SFS_REDIRECT then routes through
# fsRedirPI() (XRootD path) or RedirectTransfer (HTTP TPC path), both of
# which call into XrdXrootdRedirHelper::Redirect().
xrootd.redirlib libXrdRedirTestPlugin.so

# Stack the URL-redirect OSS wrapper into the OSS chain.  Placement BEFORE
# 'continue' is required: xrootd's 'continue' uses dup2() to replace the
# current config descriptor (XrdOucStream::docontF), so anything after
# 'continue' would be silently dropped.  Common.cfg also uses 'ofs.osslib ++
# libXrdOssTests.so'; because XrdOfsConfigPI::AddLibOss wraps in load order
# (ossPI = newWrapper(ossPI, ...)), libXrdOssTests ends up outermost and this
# wrapper sits just inside it.  That is fine: libXrdOssTests is a transparent
# pass-through for non-magic leaves, so the /urlredir/ trigger still reaches
# this wrapper.
#
# Triggers XrdOfs::open to return URL-form SFS_REDIRECT (port=-1, FileURL)
# for any path under /urlredir/; the resulting redirect goes through
# XrdXrootdProtocol::fsRedirPI() and into the URL branch of
# XrdXrootdRedirHelper::Redirect(), where the redirect plugin's RedirectURL()
# rewrites the target to the rdlplugin-rewritten-url:9997 sentinel that
# tpcredir.sh asserts on.
ofs.osslib ++ libXrdOssUrlRedirTestPlugin.so

continue $src/common.cfg
