set name = scitokens
set port = 7095

set pwd = $PWD
set src = $SOURCE_DIR

set scitokensdir = $PWD

xrootd.seclib libXrdSec.so
xrd.protocol XrdHttp:8095 libXrdHttp.so

xrd.tlsca certfile $scitokensdir/../issuer/tlsca.pem
xrd.tls $scitokensdir/../issuer/tls.crt $scitokensdir/../issuer/tls.key

ofs.authlib ++ libXrdAccSciTokens.so config=$scitokensdir/$name/scitokens.cfg
ofs.authorize 1
acc.authdb $scitokensdir/scitokens/authdb

scitokens.trace all

http.header2cgi Authorization authz
http.exthandler xrdtpc libXrdHttpTPC.so

continue $src/common.cfg
