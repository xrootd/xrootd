name: Uproot

on:
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version to test
        required: true
        default: "3.14"
        type: string
      uproot-ref:
        description: Optional uproot ref to test instead of the latest release tag
        required: false
        type: string
      fsspec-xrootd-version:
        description: Optional fsspec-xrootd version to test instead of the latest release
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  uproot:
    name: Python ${{ inputs.python-version }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      CMAKE_ARGS: -DCMAKE_BUILD_TYPE=Release
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      FSSPEC_XROOTD_VERSION: ${{ inputs['fsspec-xrootd-version'] }}
      UPROOT_REF: ${{ inputs.uproot-ref }}

    steps:
    - name: Install build dependencies
      run: |
        sudo apt update -qq
        sudo apt install -y build-essential cmake git krb5-multidev libssl-dev uuid-dev

    - name: Clone repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Build XRootD wheel
      run: |
        python -m pip install --upgrade pip
        python -m pip install build wheel
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        ./genversion.sh >| VERSION
        python -m pip wheel --use-pep517 --verbose --wheel-dir wheelhouse .

    - name: Build XRootD server
      run: |
        cmake -S . -B build/server \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$PWD/xrootd-install" \
          -DENABLE_PYTHON=0 \
          -DENABLE_TESTS=0 \
          -DENABLE_FUSE=0 \
          -DENABLE_HTTP=0 \
          -DENABLE_VOMS=0 \
          -DENABLE_SCITOKENS=0 \
          -DENABLE_MACAROONS=0 \
          -DENABLE_XRDOSSARC=0
        cmake --build build/server
        cmake --install build/server
        echo "$PWD/xrootd-install/bin" >> "$GITHUB_PATH"
        echo "LD_LIBRARY_PATH=$PWD/xrootd-install/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

    - name: Check out uproot tests
      run: |
        if [ -z "${UPROOT_REF}" ]; then
          python -m pip install uproot
          UPROOT_VERSION=$(python -m pip show uproot | awk '/^Version:/ { print $2 }')
          UPROOT_REF="tags/v${UPROOT_VERSION}"
        fi

        git clone https://github.com/scikit-hep/uproot5.git uproot
        git -C uproot checkout "${UPROOT_REF}"

    - name: Install uproot test dependencies
      run: |
        (cd uproot && python -m pip install . --group test)

    - name: Install fsspec-xrootd
      run: |
        if [ -z "${FSSPEC_XROOTD_VERSION}" ]; then
          python -m pip install --upgrade fsspec-xrootd
        else
          python -m pip install --upgrade "fsspec-xrootd==${FSSPEC_XROOTD_VERSION}"
        fi
        python -m pip show fsspec-xrootd

    - name: Install local XRootD wheel
      run: |
        python -m pip install --force-reinstall --no-deps wheelhouse/xrootd-*.whl
        command -v xrootd
        xrootd -v
        python -m pip show xrootd
        python -c 'import XRootD; print(XRootD)'
        python -c 'from XRootD import client; print(client.FileSystem("root://localhost"))'

    - name: Run uproot xrootd tests
      run: |
        python -m pytest -vv -k "xrootd" uproot/tests \
          --reruns 10 \
          --reruns-delay 30 \
          --only-rerun "(?i)OSError|FileNotFoundError|timeout|expired|connection|socket"
